    event:
        title: Événements
        nuitdelinfo:
            title: 'La Nuit de l''Info'
            desc1: 'La Nuit de l''Info est un événement proposé à l''IUT de Montpellier. Ses participants doivent créer un site Internet sur un thème et réaliser 5 défis, proposés par diverses entreprises, parmis un liste. Le thème est imposé au tout début et répond à un besoin spécifique. L''objectif est de respecter toutes ces contraintes dans un temps imparti d''environ 16h, début le jour x à 16h et fin le jour x+1 le matin aux alentours de 8h.'
            desc2: 'J''ai participé à cet événement à deux reprises : la première,en décembre 2019, mon équipe et moi avons finis premier d''un défi et avons remporté 1000 euros à se partager, et la deuxième fois, en décembre 2020, nous avons terminé troisième d''un défi et avons gagné 100 euros à se partager.'
        codegamejam:
            title: 'Code Game Jam'
            desc1: 'La Code Game Jam est un évènement organisé par l''IUT de Montpellier. Ses participants doivent développer un jeu vidéo sur un thème. Ce dernier est imposé au tout début. L''événement se déroule sur trois jours. Le premier, de 16h à 19h, c''est la découverte du thème et la mise en place de la stratégie de l''équipe. Le jour deux correspond au début de la programmation du jeux jusqu''au troisième jour 10h du matin non stop. A cette heure, chaque équipe présente à tour de rôle son projet dans un amphithéatre devant les autres équipes ainsi qu''un jury. Il est à savoir qu''au moment de la présentation, la majorité des participants n''ont pas dormi depuis 8h la veille.'
            desc2: 'J''ai participé à cet événement en janvier 2020. Nous avions fait le choix de développer le jeu sur Unity.'
