        desc: 'Mon nom est { name }. J''ai { age } ans. Laissez-moi vous raconter comment tout a commencé. Quand j''étais plus jeune, je jouais aux jeux vidéo sur des consoles telles que la Playstation 2, ma première console, puis la Playstation 3. Mon père, qui aime aussi les jeux vidéo, a acheté un ordinateur portable de jeu. Il m''a dit que l''ordinateur était mieux pour jouer et que c''était l''avenir car on peut y faire plus de choses. Un jour, il m''a fait essayer ses jeux préférés et je me souviens à quel point j''ai aimé. Depuis ce jour, j''ai acheté mon premier ordinateur de bureau et j''ai commencé à m''intéresser aux ordinateurs, tant aux matériels informatique qu''au développement.'
